apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-service
  namespace: sunchipspace
  labels:
    env: PROD
spec:
  selector:
    project: {{ .Values.app }}
  ports:
    - name: {{ .Values.app }}-listener
      protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: {{ .Values.servicePort}}
  type: {{ .Values.nodetype }}
  